<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咸鱼风二手交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        /* 顶部栏 */
        .top-bar {
            height: 60px;
            background: #FF6600; /* 咸鱼橙红主色 */
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .top-bar h1 {
            font-size: 20px;
            font-weight: bold;
        }
        .top-bar .search {
            width: 300px;
            height: 36px;
            border-radius: 18px;
            border: none;
            padding: 0 15px;
            outline: none;
        }
        /* 主体容器（左+右） */
        .container {
            display: flex;
            height: calc(100vh - 60px); /* 占满剩余屏幕 */
        }
        /* 左侧窄导航（固定宽度） */
        .left-nav {
            width: 120px; /* 窄导航，适配需求 */
            background: #fff;
            border-right: 1px solid #f5f5f5;
            padding-top: 20px;
        }
        .nav-item {
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 8px;
            margin: 0 10px 15px;
        }
        .nav-item.active {
            background: #FF6600;
            color: #fff;
        }
        .nav-item i {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .nav-item span {
            font-size: 14px;
        }
        /* 右侧内容区 */
        .right-content {
            flex: 1; /* 占满剩余宽度 */
            background: #f5f5f5;
            padding: 20px;
            overflow-y: auto;
        }
        /* 内容模块（默认只显示首页，其他隐藏） */
        .content-box {
            display: none;
            background: #fff;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            padding: 20px;
        }
        .content-box.active {
            display: block;
        }
    </style>
    <!-- 图标（简单替代，不用额外引入） -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <!-- 顶部栏 -->
    <div class="top-bar">
        <h1>XX二手交易平台</h1>
        <input type="text" class="search" placeholder="搜二手好物/闲置">
        <span>扫码登录</span>
    </div>

    <!-- 主体容器 -->
    <div class="container">
        <!-- 左侧窄导航 -->
        <div class="left-nav">
            <div class="nav-item active" onclick="switchPage('home')">
                <i class="fa fa-home"></i>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="switchPage('publish')">
                <i class="fa fa-pencil"></i>
                <span>发布</span>
            </div>
            <div class="nav-item" onclick="switchPage('message')">
                <i class="fa fa-comments"></i>
                <span>消息</span>
            </div>
            <div class="nav-item" onclick="switchPage('mine')">
                <i class="fa fa-user"></i>
                <span>我的</span>
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="right-content">
            <!-- 首页内容 -->
            <div class="content-box active" id="home">
                <h2>首页 - 推荐闲置</h2>
                <p style="margin-top:10px;color:#999;">（这里放商品分类+推荐商品卡片，咸鱼风网格布局）</p >
            </div>
            <!-- 发布商品内容 -->
            <div class="content-box" id="publish">
                <h2>发布闲置</h2>
                <p style="margin-top:10px;color:#999;">（这里放图片上传+商品信息表单+发货信息）</p >
            </div>
            <!-- 消息聊天内容 -->
            <div class="content-box" id="message">
                <h2>消息中心</h2>
                <p style="margin-top:10px;color:#999;">（这里放联系人列表+聊天窗口）</p >
            </div>
            <!-- 我的页面内容 -->
            <div class="content-box" id="mine">
                <h2>个人中心</h2>
                <p style="margin-top:10px;color:#999;">（这里放个人信息+订单管理+我的商品）</p >
            </div>
        </div>
    </div>

    <script>
        // 页面切换核心函数
        function switchPage(pageId) {
            // 导航选中态切换
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            // 内容区切换
            document.querySelectorAll('.content-box').forEach(box => box.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
